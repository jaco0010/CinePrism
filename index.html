<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Prism</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png"
        href="https://th.bing.com/th/id/OIP.vFrYcLobsnJUxU3mOjX8LwHaHa?w=178&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <h1 class="logo">Cine Prism</h1>
        <div class="search-container">
            <input type="text" placeholder="Search movies..." id="input-search">
            <div id="search-results">
                
            </div>
            <button id="buscar">Search</button>
        </div>
    </nav>

    <header class="hero">
        <span>MOVIE OF THE WEEK</span>
        <h3 id="titulo-pelicula-semana"></h3>
    </header>

    <div class="week-movie">
        <main class="movie-container">  
                <img src="./images/scream-7.webp"  id="movie-poster">
                <div class="info-movieweek">
                <h2 id="titulo-pelicula"></h2>
                 <p id="movie-desc"></p>
                 <button>Ver mas informacion</button>
                </div>
        </main>
            </div>


    <div class="title-featured">
    <h2>Featured films</h2>
    </div>

    <div class="buttons-films">
        <button>All</button>
        <button>New releases</button>
        <button>Billboard</button>
        <button>Presale</button>
        <button>Ready</button>
    </div>
    
    <div id="movies-main" class="container-featured">
        
    </div>

    <footer class="footer">
        <p>My Website. All rights reserved</p>
        <a href="#">Privacy Policy</a>
        <a href="#">Contact us</a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
